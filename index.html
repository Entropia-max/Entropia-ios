<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Mantenimiento">
    
    <title>Mantenimiento</title>
    <style>
        /* Estilos generales */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; /* Fuente nativa de Apple primero */
            -webkit-font-smoothing: antialiased; /* Suavizado de fuente en Mac/iOS */
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* 100dvh soluciona el problema de la barra de direcciones en Safari iOS */
            height: 100vh; 
            height: 100dvh; 
            
            text-align: center;
            color: #333;
        }

        /* Contenedor tipo tarjeta */
        .mantenimiento-card {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 18px; /* Un poco más redondo, estilo iOS */
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            max-width: 85%;
            width: 350px;
        }

        /* Icono */
        .icono {
            font-size: 65px;
            margin-bottom: 15px;
            -webkit-animation: flotar 3s ease-in-out infinite; /* Prefijo webkit para Safari antiguo */
            animation: flotar 3s ease-in-out infinite;
        }

        /* Textos */
        h1 {
            font-size: 24px;
            margin: 0 0 10px 0;
            color: #1c1c1e; /* Color oscuro típico de iOS */
            font-weight: 600;
        }

        p {
            font-size: 16px;
            color: #8e8e93; /* Gris típico de iOS */
            line-height: 1.5;
            margin: 0;
        }

        /* Animación */
        @-webkit-keyframes flotar {
            0% { -webkit-transform: translateY(0px); }
            50% { -webkit-transform: translateY(-10px); }
            100% { -webkit-transform: translateY(0px); }
        }
        @keyframes flotar {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

    <div class="mantenimiento-card">
        <div class="icono">🛠️</div>
        <h1>App en mantenimiento</h1>
        <p>Estamos trabajando para mejorar tu experiencia. Estaremos de vuelta muy pronto, gracias por tu paciencia.</p>
    </div>

</body>
</html>
