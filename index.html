<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Horarios Gaby">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>Horarios Gaby 🧸</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body{font-family:Arial,sans-serif;background:#0a192f;color:white;margin:0;padding:0;overflow-x:hidden; -webkit-tap-highlight-color: transparent;}
        .header{background:#102a43;padding:15px;text-align:center;font-size:22px;font-weight:bold;border-bottom:2px solid #3b82f6;}
        #menu-principal {display: block;}
        #menu-temporada {display: none;}
        #vista-completa {display: none; background: white; width: 100vw; height: 100vh; overflow: auto;}
        .card{background:#1c3d5a;margin:5px;padding:10px;border-radius:8px;}
        label{font-size:11px; display:block; margin-bottom:2px; color:#cbd5e1;}
        input,button,select{width:100%;padding:10px;margin-top:5px;border:none;border-radius:6px;font-size:14px;box-sizing:border-box;}
        .btn{background:#3b82f6;color:white;font-weight:bold;cursor:pointer;}
        .btn-green{background:#22c55e;color:white;}
        .btn-red{background:#ef4444;color:white;}
        .btn-orange{background:#f59e0b;color:white;}
        .btn-dark{background:#334155;color:white;}
        #zona{background:white;padding:2px;width:100%; min-height: 50px;}
        table{width:100%;border-collapse:collapse;font-size:9px;table-layout:fixed;color:black;}
        th{background:#f3f4f6;border:1px solid #000;padding:1px;font-size:9px;}
        td{border:1px solid #000;padding:3px 0;text-align:center;height:22px;}
        .dep-row{background:#f59e0b;color:black;font-weight:bold;text-align:left;padding-left:5px;font-size:10px;}
        .descanso{background:#16a34a !important;color:white !important;font-weight:bold;}
        .vacaciones{background:#0ea5e9 !important;color:white !important;font-weight:bold;}
        .nombre-col{text-align:left;padding-left:3px;font-weight:bold;background:#fafafa;width:22%;font-size:8px;}
    </style>
</head>
<body>

<div id="menu-principal">
    <div class="header">Horarios Gaby 🧸</div>

    <div class="card">
        <label>Colaborador:</label>
        <select id="empVac"></select>
        
        <div style="display:flex; gap:5px; margin-top:5px;">
            <input type="date" id="vac1" title="Día Vacación 1">
            <input type="date" id="vac2" title="Día Vacación 2">
        </div>
        <button class="btn" onclick="guardarVacaciones()">Asignar Día(s) de Vacaciones</button>
        
        <div style="display:flex; gap:5px; margin-top:10px;">
            <input type="date" id="diaEsp1" title="Especial 1">
            <input type="date" id="diaEsp2" title="Especial 2">
        </div>
        <button class="btn btn-orange" onclick="guardarEspeciales()">Fijar Descanso(s) Especial(es)</button>

        <input type="date" id="diaEntrada11" style="margin-top:10px;">
        <button class="btn btn-green" onclick="guardarEntrada11()">Asignar Entrada 11:00 AM</button>
    </div>

    <div class="card">
        <button class="btn" style="background:#8b5cf6;" onclick="generar()">🔄 GENERAR HORARIOS</button>
        <div style="display:flex; gap:4px; margin-top:8px;">
            <button class="btn" onclick="mostrarVistaCompleta()">Pantalla Completa</button>
            <button class="btn-red" onclick="reiniciar()">Limpiar Todo</button>
        </div>
        <button class="btn btn-dark" style="margin-top:15px;" onclick="abrirMenuTemporada()">⚙️ Menú de Temporada (Gerencia)</button>
    </div>

    <div id="zona">
        <table id="tabla"></table>
    </div>
</div>

<div id="menu-temporada">
    <div class="header" style="background:#dc2626;">Gestión de Temporada Alta</div>
    <div class="card">
        <p style="font-size:12px; color:#94a3b8; margin-top:0;">Al activar un área, el sistema asignará <b>SOLO 1 DESCANSO</b> al azar dentro del rango de fechas. Los descansos especiales manuales seguirán siendo respetados.</p>
        
        <label>Área a modificar:</label>
        <select id="depTemporada">
            <option value="Cajero Principal y Mixtos">Cajero Principal y Mixtos</option>
            <option value="Promotoría">Promotoría</option>
            <option value="Cajas abono">Cajas abono</option>
            <option value="Afore">Afore</option>
        </select>
        
        <div style="display:flex; gap:5px; margin-top:5px;">
            <input type="date" id="tempInicio" title="Inicio de Temporada">
            <input type="date" id="tempFin" title="Fin de Temporada">
        </div>
        
        <button class="btn btn-orange" style="margin-top:10px;" onclick="guardarTemporada()">Activar Rango para esta Área</button>
        <button class="btn btn-red" style="margin-top:5px;" onclick="limpiarTemporada()">Desactivar Todo</button>
    </div>
    
    <div class="card" id="lista-temporadas" style="font-size:12px;"></div>
    
    <div class="card">
        <button class="btn" onclick="cerrarMenuTemporada()">⬅️ Volver al Menú Principal</button>
    </div>
</div>

<div id="vista-completa">
    <div id="contenido-full"></div>
</div>

<script>
const datosBase = [
    {dep:"Cajero Principal y Mixtos", nombre:"Fabiola"}, {dep:"Cajero Principal y Mixtos", nombre:"Karen"},
    {dep:"Cajero Principal y Mixtos", nombre:"Lizbeth"}, {dep:"Cajero Principal y Mixtos", nombre:"Nallely"},
    {dep:"Cajero Principal y Mixtos", nombre:"Eileen"}, {dep:"Cajero Principal y Mixtos", nombre:"Zurizadai"},
    {dep:"Cajero Principal y Mixtos", nombre:"Luz"}, {dep:"Promotoría", nombre:"Michel"},
    {dep:"Promotoría", nombre:"Gustavo"}, {dep:"Promotoría", nombre:"Karla"},
    {dep:"Promotoría", nombre:"Omar"}, {dep:"Promotoría", nombre:"Faviola"},
    {dep:"Promotoría", nombre:"Ernesto"}, {dep:"Cajas abono", nombre:"Arlette"},
    {dep:"Cajas abono", nombre:"Minerva"}, {dep:"Cajas abono", nombre:"Beatriz"},
    {dep:"Cajas abono", nombre:"Rosmery"}, {dep:"Cajas abono", nombre:"Jesús"},
    {dep:"Cajas abono", nombre:"Lourdes"}, {dep:"Afore", nombre:"Karen Afore"},
    {dep:"Afore", nombre:"Anthony"}
];

let empleados = JSON.parse(localStorage.getItem("cf_emp")) || datosBase.map(e => ({...e, vacaciones:[], especiales:[], entradas11:[], horario:{}}));
let temporadas = JSON.parse(localStorage.getItem("cf_temporadas")) || {};

function obtenerSemana(){
    let hoy = new Date();
    let proximoLunes = new Date(hoy);
    proximoLunes.setDate(hoy.getDate() + ( (7 - hoy.getDay() + 1) % 7 || 7));
    let dias=[];
    for(let i=0;i<7;i++){
        let d = new Date(proximoLunes);
        d.setDate(proximoLunes.getDate() + i);
        let iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        dias.push({ nombre:["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"][i], num:d.getDate(), iso:iso });
    }
    return dias;
}

function generar(){
    let dias = obtenerSemana();
    empleados.forEach(e => e.horario = {});

    // 1. Marcar Vacaciones, Especiales y Reglas Inamovibles
    for(let d=0; d<7; d++){
        let diaNum = dias[d].num;
        empleados.forEach(e => {
            if(e.vacaciones.includes(dias[d].iso)) e.horario[d] = "VAC";
            else if(e.especiales.includes(dias[d].iso)) e.horario[d] = "D";
            
            // Bloqueo de fechas críticas (15, 16, 20)
            if((e.dep === "Afore" || e.nombre === "Fabiola") && [15,16,20].includes(diaNum)) {
                if(!e.horario[d]) e.horario[d] = "-"; 
            }
        });
    }

    const departamentos = ["Cajero Principal y Mixtos", "Promotoría", "Cajas abono", "Afore"];

    // 2. Asignar descansos respetando Reglas y Temporadas
    departamentos.forEach(dep => {
        let grupo = empleados.filter(e => e.dep === dep);
        let configTemp = temporadas[dep]; // Revisar si este departamento tiene temporada activa
        
        // Identificar los días permitidos y si la semana cae en temporada
        let diasPermitidos = [0,1,2,3,4,5,6];
        let targetDescansosGral = 2;
        
        if(configTemp) {
            let diasDentroDeRango = [];
            for(let d=0; d<7; d++) {
                if(dias[d].iso >= configTemp.inicio && dias[d].iso <= configTemp.fin) {
                    diasDentroDeRango.push(d);
                }
            }
            if(diasDentroDeRango.length > 0) {
                targetDescansosGral = 1;
                diasPermitidos = diasDentroDeRango;
            }
        }

        grupo.forEach((emp, idx) => {
            let actual = Object.values(emp.horario).filter(v => v === "D" || v === "VAC").length;
            let intentos = 0;
            let target = targetDescansosGral;

            while(actual < target && intentos < 200) {
                // Se elige aleatoriamente solo de los días permitidos (toda la semana si es normal, o el rango si es temporada)
                let d = diasPermitidos[Math.floor(Math.random() * diasPermitidos.length)];
                let dNum = dias[d].num;

                let esDiaAdyacente = (emp.horario[d-1] === "D" || emp.horario[d-1] === "VAC" || emp.horario[d+1] === "D" || emp.horario[d+1] === "VAC");
                let vecinoArribaD = (idx > 0 && (grupo[idx-1].horario[d] === "D" || grupo[idx-1].horario[d] === "VAC"));
                let vecinoAbajoD = (idx < grupo.length - 1 && (grupo[idx+1].horario[d] === "D" || grupo[idx+1].horario[d] === "VAC"));

                let ocupacionDia = grupo.filter(e => e.horario[d] === "D" || e.horario[d] === "VAC").length;
                let cupoMax = (dep === "Afore") ? 1 : 2;
                
                if([15,16,20].includes(dNum)) { cupoMax = (dep === "Afore") ? 0 : 1; }
                let prohibidoPromotoria = (dep === "Promotoría" && [15,16,20].includes(dNum) && emp.nombre !== "Ernesto" && emp.nombre !== "Faviola");

                // En temporada es más permisivo con la dispersión si es necesario, pero intenta mantenerla
                let dispersionValida = (target === 1) ? true : (!esDiaAdyacente && !vecinoArribaD && !vecinoAbajoD);

                if(!emp.horario[d] && !prohibidoPromotoria && ocupacionDia < cupoMax && dispersionValida) {
                    emp.horario[d] = "D";
                    actual++;
                }
                intentos++;
            }

            // FASE DE EMERGENCIA
            if (actual < target) {
                for(let i=0; i<diasPermitidos.length && actual < target; i++) {
                    let d = diasPermitidos[i];
                    let dNum = dias[d].num;
                    if(!emp.horario[d]) {
                        let ocupacionDia = grupo.filter(e => e.horario[d] === "D" || e.horario[d] === "VAC").length;
                        let cupoMax = (dep === "Afore") ? 1 : 2;
                        if([15,16,20].includes(dNum)) cupoMax = (dep === "Afore") ? 0 : 1;
                        
                        if(ocupacionDia < cupoMax) { emp.horario[d] = "D"; actual++; }
                    }
                }
            }
            
            // FASE EXTREMA (Garantía Total)
            if (actual < target) {
                for(let i=0; i<diasPermitidos.length && actual < target; i++) {
                    let d = diasPermitidos[i];
                    if(!emp.horario[d] || emp.horario[d] === "-") {
                        if(emp.horario[d] === "-" && (emp.nombre === "Fabiola" || dep === "Afore")) continue; 
                        emp.horario[d] = "D";
                        actual++;
                    }
                }
            }
        });
    });

    // Limpiar marcas temporales
    empleados.forEach(e => { for(let d=0; d<7; d++) { if(e.horario[d] === "-") delete e.horario[d]; } });

    // 3. Asignar turnos de comida
    for(let d=0; d<7; d++){
        departamentos.forEach(dep => {
            let activos = empleados.filter(e => e.dep === dep && !e.horario[d]);
            let turnosGral = (dep === "Afore") ? ["12-1", "1-2", "2-3"] : ["12-1", "1-2", "2-3", "3-4"];
            turnosGral.sort(() => Math.random() - 0.5);

            activos.forEach((e, i) => {
                let comida = "";
                if(e.nombre === "Fabiola") {
                    comida = (((d > 0) && (e.horario[d-1] === "D" || e.horario[d-1] === "VAC")) ? "4-5" : "4-6");
                } else if (e.nombre === "Ernesto") {
                    comida = "12:30-1:30";
                } else {
                    comida = turnosGral[i % turnosGral.length];
                }
                e.horario[d] = (e.entradas11 && e.entradas11.includes(dias[d].iso)) ? "11:00 / " + comida : comida;
            });
        });
    }
    
    mostrar();
    localStorage.setItem("cf_emp", JSON.stringify(empleados));
}

function mostrar(){
    let dias = obtenerSemana();
    let html = `<tr><th style="width:22%">Nombre</th>`;
    dias.forEach(d => html += `<th>${d.nombre}<br>${d.num}</th>`);
    html += `</tr>`;
    let depActual = "";
    const orden = ["Cajero Principal y Mixtos", "Promotoría", "Cajas abono", "Afore"];
    let final = [];
    orden.forEach(dep => final = final.concat(empleados.filter(e => e.dep === dep)));
    
    final.forEach(e => {
        if(e.dep !== depActual){ html += `<tr><td colspan="8" class="dep-row">${e.dep}</td></tr>`; depActual = e.dep; }
        html += `<tr><td class="nombre-col">${e.nombre}</td>`;
        for(let i=0; i<7; i++){
            let v = e.horario[i] || "-";
            let c = (v === "D" || v.includes("D")) ? "descanso" : (v === "VAC" ? "vacaciones" : "");
            html += `<td class="${c}">${v}</td>`;
        }
        html += `</tr>`;
    });
    document.getElementById("tabla").innerHTML = html;
}

function mostrarVistaCompleta() {
    let tabla = document.getElementById("tabla").innerHTML;
    if(tabla === "") return alert("Genera los horarios primero");
    document.getElementById("contenido-full").innerHTML = `<div style="padding:10px; background:#102a43; color:white; text-align:center; font-weight:bold;">Horarios Gaby 🧸</div><table style="width:100%">${tabla}</table>`;
    document.getElementById("menu-principal").style.display = "none";
    document.getElementById("vista-completa").style.display = "block";
    history.pushState({view: 'full'}, '');
}

window.onpopstate = function() { 
    document.getElementById("vista-completa").style.display = "none"; 
    document.getElementById("menu-principal").style.display = "block"; 
    document.getElementById("menu-temporada").style.display = "none"; 
};

function guardarVacaciones(){
    let i = document.getElementById("empVac").value;
    let f1 = document.getElementById("vac1").value;
    let f2 = document.getElementById("vac2").value;
    if(!f1 && !f2) return alert("Selecciona al menos un día de vacaciones");
    const registrar = (f) => { if(f && !empleados[i].vacaciones.includes(f)) empleados[i].vacaciones.push(f); };
    registrar(f1); registrar(f2);
    alert("Día(s) de vacaciones registrados");
    localStorage.setItem("cf_emp", JSON.stringify(empleados));
}

function guardarEspeciales(){
    let i = document.getElementById("empVac").value, f1 = document.getElementById("diaEsp1").value, f2 = document.getElementById("diaEsp2").value;
    if(!f1 && !f2) return alert("Selecciona al menos un día");
    const registrar = (f) => { if(f && !empleados[i].especiales.includes(f)) empleados[i].especiales.push(f); };
    registrar(f1); registrar(f2);
    alert("Guardado");
    localStorage.setItem("cf_emp", JSON.stringify(empleados));
}

function guardarEntrada11(){
    let i = document.getElementById("empVac").value, f = document.getElementById("diaEntrada11").value;
    if(!f) return alert("Fecha inválida");
    if(!empleados[i].entradas11) empleados[i].entradas11 = [];
    if(!empleados[i].entradas11.includes(f)) empleados[i].entradas11.push(f);
    alert("Fijado a las 11:00 AM");
    localStorage.setItem("cf_emp", JSON.stringify(empleados));
}

function reiniciar(){ 
    if(confirm("¿Resetear todo?")) { 
        localStorage.removeItem("cf_emp");
        empleados = datosBase.map(e => ({...e, vacaciones:[], especiales:[], entradas11:[], horario:{}}));
        document.getElementById("tabla").innerHTML = "";
        alert("Limpio.");
    } 
}

function cargarSelect(){
    let sel = document.getElementById("empVac");
    sel.innerHTML = "";
    empleados.forEach((e,i) => { let op = document.createElement("option"); op.value = i; op.textContent = e.nombre; sel.appendChild(op); });
}

// FUNCIONES DEL MENÚ DE TEMPORADA
function abrirMenuTemporada() {
    let pwd = prompt("Ingrese la contraseña de Gerencia:");
    if (pwd === "GerenciaEntropia") {
        document.getElementById("menu-principal").style.display = "none";
        document.getElementById("menu-temporada").style.display = "block";
        actualizarListaTemporadas();
    } else if (pwd !== null) {
        alert("Acceso denegado. Contraseña incorrecta.");
    }
}

function cerrarMenuTemporada() {
    document.getElementById("menu-temporada").style.display = "none";
    document.getElementById("menu-principal").style.display = "block";
}

function guardarTemporada() {
    let dep = document.getElementById("depTemporada").value;
    let ini = document.getElementById("tempInicio").value;
    let fin = document.getElementById("tempFin").value;
    
    if(!ini || !fin) return alert("Seleccione la fecha de inicio y fin.");
    
    temporadas[dep] = { inicio: ini, fin: fin };
    localStorage.setItem("cf_temporadas", JSON.stringify(temporadas));
    actualizarListaTemporadas();
    alert("Temporada Alta configurada para " + dep);
}

function limpiarTemporada() {
    if(confirm("¿Seguro que deseas desactivar la temporada alta para todas las áreas?")) {
        temporadas = {};
        localStorage.setItem("cf_temporadas", JSON.stringify(temporadas));
        actualizarListaTemporadas();
        alert("Todas las áreas han regresado a su horario normal.");
    }
}

function actualizarListaTemporadas() {
    let contenedor = document.getElementById("lista-temporadas");
    let html = "<b>Áreas con Temporada Alta (1 Descanso):</b><br><br>";
    let count = 0;
    
    for(let dep in temporadas) {
        html += `<div style="background:#0f172a; padding:5px; margin-bottom:5px; border-radius:4px;">
                    <span style="color:#f59e0b; font-weight:bold;">${dep}</span><br>
                    Rango: ${temporadas[dep].inicio} al ${temporadas[dep].fin}
                 </div>`;
        count++;
    }
    
    if(count === 0) { html += "<div style='color:#94a3b8;'>Ninguna configurada actualmente.</div>"; }
    contenedor.innerHTML = html;
}

cargarSelect();
mostrar();
</script>
</body>
</html>
