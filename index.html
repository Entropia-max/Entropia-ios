<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mi Aplicación iOS</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        button { background-color: #007AFF; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        button:active { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>¡App funcionando en iOS!</h1>
        <p>Esta es la versión optimizada para tu iPad y iPhone.</p>
        <button onclick="saludo()">Pruébame</button>
    </div>

    <script>
        function saludo() {
            alert("¡Funciona perfectamente en Safari!");
        }
    </script>
</body>
</html>
